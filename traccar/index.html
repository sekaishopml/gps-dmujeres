<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="${colorPrimary}" />
    <meta name="description" content="${description}" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" sizes="180x180" />
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- Preconnect to Google Maps tiles and fonts to reduce network latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://mt0.google.com" />
    <link rel="preconnect" href="https://mt1.google.com" />
    <link rel="preconnect" href="https://mt2.google.com" />
    <link rel="preconnect" href="https://mt3.google.com" />
    
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/custom.css?v=1.0.5">
    <title>${title}</title>
    <style>
      .loader {
        position: fixed; inset: 0; margin: auto;
        width: 40px; aspect-ratio: 1; box-sizing: content-box; animation: ll 1s infinite linear;
        border-radius: 50%; border: 4px solid lightgray; border-right-color: black;
      }
      @keyframes ll {to{transform: rotate(1turn)}}
    </style>
    <script src="/basemaps.js"></script>
    <script type="module" crossorigin src="/assets/index-bel1r0Sr.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/chunk-aKtaBQYM.js">
    <link rel="modulepreload" crossorigin href="/assets/mui-BgU4WrXF.js">
    <link rel="modulepreload" crossorigin href="/assets/List-C_tzGiQy.js">
    <link rel="modulepreload" crossorigin href="/assets/IconButton-oialqkv3.js">
    <link rel="modulepreload" crossorigin href="/assets/Menu-CRiQ3s6A.js">
    <link rel="modulepreload" crossorigin href="/assets/useControlled-o7n9RX7U.js">
    <link rel="modulepreload" crossorigin href="/assets/Select-Bu2vmaew.js">
    <link rel="modulepreload" crossorigin href="/assets/Typography-7EcQ2i3p.js">
    <link rel="modulepreload" crossorigin href="/assets/dayjs.min-C4hTNXA3.js">
  <link rel="manifest" href="/manifest.webmanifest"></head>
  <body>
    <noscript>Enable JavaScript to use <a href="https://www.traccar.org/">Traccar GPS Tracking System</a>.</noscript>
    <div id="root" class="root"></div>
    <div class="loader"></div>
    <!-- Route Web Worker - procesamiento en segundo plano -->
  <script>
    // Crear Web Worker para parseo de rutas sin bloquear UI
    var routeWorker = null;
    try {
      routeWorker = new Worker("/route-worker.js");
      routeWorker.onmessage = function(e) {
        var msg = e.data;
        if (msg.type === "parsed" && msg.count > 0) {
          console.log("[RouteWorker] Parsed " + msg.count + " points in background");
        }
      };
      routeWorker.onerror = function(e) {
        console.warn("[RouteWorker] Error:", e.message);
      };
    } catch(e) {
      console.warn("[RouteWorker] Worker not available:", e.message);
    }

    // Interceptar fetch para /api/positions y /api/positions/latest
    var origFetch = window.fetch;
    window.fetch = function() {
      var url = arguments[0];
      if (typeof url === "string" && (url.indexOf("/api/positions") >= 0 || url.indexOf("/api/v2/positions") >= 0)) {
        console.log("[RouteWorker] Intercepted positions fetch:", url);
        return origFetch.apply(this, arguments).then(function(response) {
          if (response.ok && routeWorker) {
            var cloned = response.clone();
            cloned.json().then(function(data) {
              routeWorker.postMessage({ type: "parse", data: data });
            }).catch(function() {});
          }
          return response;
        });
      }
      return origFetch.apply(this, arguments);
    };
  </script>

</body>
</html>
