    <!-- Route Web Worker - procesamiento en segundo plano -->
  <script>
    // Crear Web Worker para parseo de rutas sin bloquear UI
    var routeWorker = null;
    try {
      routeWorker = new Worker("/route-worker.js");
      routeWorker.onmessage = function(e) {
        var msg = e.data;
        if (msg.type === "parsed" && msg.count > 0) {
          console.log("[RouteWorker] Parsed " + msg.count + " points in background");
        }
      };
      routeWorker.onerror = function(e) {
        console.warn("[RouteWorker] Error:", e.message);
      };
    } catch(e) {
      console.warn("[RouteWorker] Worker not available:", e.message);
    }

    // Interceptar fetch para /api/positions y /api/v2/route
    var origFetch = window.fetch;
    window.fetch = function() {
      var url = arguments[0];
      if (typeof url === "string" && (url.indexOf("/api/positions") >= 0 || url.indexOf("/api/v2/positions") >= 0)) {
        console.log("[RouteWorker] Intercepted positions fetch:", url);
        return origFetch.apply(this, arguments).then(function(response) {
          if (response.ok && routeWorker) {
            var cloned = response.clone();
            cloned.json().then(function(data) {
              routeWorker.postMessage({ type: "parse", data: data });
            }).catch(function() {});
          }
          return response;
        });
      }
      if (url.indexOf("/api/v2/route/") >= 0) {
        var sep = url.indexOf("?") >= 0 ? "&" : "?";
        arguments[0] = url + sep + "fps=10";
        return origFetch.apply(this, arguments);
      }
      return origFetch.apply(this, arguments);
    };
  </script>


<script>
// === SMOOTH REPLAY ENGINE ===
// Cola de posiciones animadas a 60fps para replay fluido como agua
(function() {
  var marker = null;
  var queue = [];
  var animating = false;

  function init() {
    if (typeof google === "undefined" || !google.maps) {
      return setTimeout(init, 500);
    }
    overrideMarker();
    console.log("[SmoothReplay] Motor fluido activado");
  }

  function overrideMarker() {
    var orig = google.maps.Marker.prototype.setPosition;
    if (orig.__smooth) return;
    google.maps.Marker.prototype.setPosition = function(pos) {
      marker = this;
      if (pos && typeof pos.lat === "function") {
        queue.push({ lat: pos.lat(), lng: pos.lng() });
        if (!animating) processQueue(orig);
        return;
      }
      return orig.apply(this, arguments);
    };
    google.maps.Marker.prototype.setPosition.__smooth = true;
  }

  function processQueue(origSetPos) {
    if (queue.length < 2) {
      if (queue.length === 1) {
        var p = queue[0];
        origSetPos.call(marker, new google.maps.LatLng(p.lat, p.lng));
      }
      queue = [];
      animating = false;
      return;
    }
    animating = true;
    var from = queue.shift();
    var to = queue[0];
    var startTime = performance.now();
    var duration = 300;

    function animate(now) {
      var t = Math.min(1, (now - startTime) / duration);
      var ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      var lat = from.lat + (to.lat - from.lat) * ease;
      var lng = from.lng + (to.lng - from.lng) * ease;
      origSetPos.call(marker, new google.maps.LatLng(lat, lng));
      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        processQueue(origSetPos);
      }
    }
    requestAnimationFrame(animate);
  }

  if (document.readyState === "complete" || document.readyState === "interactive") {
    init();
  } else {
    document.addEventListener("DOMContentLoaded", init);
  }
})();
</script>
