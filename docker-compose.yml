services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: dmt-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dmtracker}
      POSTGRES_USER: ${POSTGRES_USER:-dmt_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dmt_secure_pass_2026}
      POSTGRES_INITDB_ARGS: "--data-checksums"
      TZ: ${TZ:-America/Guayaquil}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/setup-timescaledb-traccar.sql:/docker-entrypoint-initdb.d/01_setup.sql
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dmt_admin} -d ${POSTGRES_DB:-dmtracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=timescaledb"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "jit=off"
      - "-c"
      - "random_page_cost=1.1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  traccar:
    image: traccar/traccar:6.2-alpine
    container_name: dmt-traccar
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - ./traccar/logs:/opt/traccar/logs
      - ./traccar/traccar-custom.css:/opt/traccar/web/custom.css:ro
      - ./traccar/basemaps.js:/opt/traccar/web/basemaps.js:ro
      - ./traccar/sw.js:/opt/traccar/web/sw.js:ro
    ports:
      - "8082:8082"
    environment:
      - JAVA_TOOL_OPTIONS=-Xms1g -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8082/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ingestor:
    build:
      context: ./ingestor
      dockerfile: Dockerfile
    container_name: dmt-ingestor
    restart: unless-stopped
    ports:
      - "127.0.0.1:5055:5055"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dmt_admin}:${POSTGRES_PASSWORD:-dmt_secure_pass_2026}@timescaledb:5432/${POSTGRES_DB:-dmtracker}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      timescaledb:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  debug-dashboard:
    build:
      context: ./debug-dashboard
      dockerfile: Dockerfile
    container_name: dmt-debug-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8085:8085"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dmt_admin}:${POSTGRES_PASSWORD:-dmt_secure_pass_2026}@timescaledb:5432/${POSTGRES_DB:-dmtracker}
      LOG_FILE_PATH: /opt/traccar/logs/tracker-server.log
    volumes:
      - ./traccar/logs:/opt/traccar/logs:ro
    depends_on:
      timescaledb:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: dmt-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  webhook-receiver:
    build:
      context: ./webhook-receiver
      dockerfile: Dockerfile
    container_name: dmt-webhook
    restart: unless-stopped
    ports:
      - 127.0.0.1:8000:8000
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  route-cron:
    build:
      context: ./scripts
      dockerfile: Dockerfile.cron
    container_name: dmt-route-cron
    restart: "no"
    environment:
      DATABASE_URL: postgresql://dmt_admin:${POSTGRES_PASSWORD:-dmt_secure_pass_2026}@timescaledb:5432/dmtracker
      REDIS_URL: redis://redis:6379
      TZ: America/Guayaquil
      RUN_ONCE: "true"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  default:
    name: dmt-network
    driver: bridge
