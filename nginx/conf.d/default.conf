# ============================================
# D-MUJERES-TRACCAR: Configuración de Sitio
# ============================================

# Rate limiting para el ingestor (protege contra flooding)
limit_req_zone $binary_remote_addr zone=ingestor_limit:10m rate=100r/s;
limit_conn_zone $binary_remote_addr zone=ingestor_conn:10m;

# ========== Upstreams ==========
upstream ingestor_upstream {
    server 127.0.0.1:5055;
    keepalive 32;
}

upstream api_upstream {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream frontend_upstream {
    server 127.0.0.1:8082;
    keepalive 32;
}

# ========== HTTP - Desarrollo ==========
server {
    listen 80 default_server;
    server_name _;

    # ========== Puerto 5055: Traccar Client (OsmAnd) ==========
    location / {
        limit_req zone=ingestor_limit burst=50 nodelay;
        limit_conn ingestor_conn 20;

        proxy_pass http://ingestor_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # ========== WebSocket Live Updates ==========
    location /api/socket {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ========== API REST ==========
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ========== Dashboard Frontend Assets ==========
    location /assets/ {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ========== Dashboard Frontend ==========
    location /admin/ {
        proxy_pass http://frontend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
