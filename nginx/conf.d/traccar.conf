server {
    listen 80 default_server;
    server_name _;

    # Redirigir raíz a /dmujeres-traccar/ (para compatibilidad)
    location = / {
        return 301 /dmujeres-traccar/;
    }

    # Consola Web de Dmujeres Traccar
    location /dmujeres-traccar/ {
        proxy_pass http://traccar:8082/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Ingestor OsmAnd para Apps Móviles
        # Archivos estaticos del frontend Traccar
    location = /basemaps.js { proxy_pass http://traccar:8082; }
    location = /styles.css { proxy_pass http://traccar:8082; }
    location = /custom.css { proxy_pass http://traccar:8082; }
    location = /favicon.ico { proxy_pass http://traccar:8082; }
    location = /manifest.webmanifest { proxy_pass http://traccar:8082; }
    location ~* ^/apple-touch-icon { proxy_pass http://traccar:8082; }

location / {
        proxy_pass http://traccar:5055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # Rutas hacia el nuevo Webhook Backend (FastAPI)
    # ==========================================

    # Web Worker script (servido directo desde el host)
    # Web Worker script (servido desde webhook-receiver)
    location /route-worker.js {
        proxy_pass http://webhook-receiver:8000/route-worker.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    # API v2 (nuevo backend completo)
    location /api/v2/ {
        proxy_pass http://webhook-receiver:8000/api/v2/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Login de sesion (autenticacion moderna)
    location /api/session {
        proxy_pass http://webhook-receiver:8000/api/session;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Posiciones (streaming + cache)
    location /api/positions {
        proxy_pass http://webhook-receiver:8000/api/positions;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Dispositivos
    location /api/devices {
        proxy_pass http://webhook-receiver:8000/api/devices;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # API REST existente (lo que aun no migramos va a Java)
    # ==========================================


    location /dmujeres-gps/ {
        proxy_pass http://traccar:8082/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Consola Web (proxied from host /dmujeres-gps/ -> /admin/)
    location /admin/ {
        proxy_pass http://traccar:8082/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Assets estáticos
    location /assets/ {
        proxy_pass http://traccar:8082/assets/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Caché agresiva: 1 año (los hashes del nombre invalidan automáticamente)
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # API endpoints directos requeridos por Traccar Manager (Mobile)
    location /api/ {
        proxy_pass http://traccar:8082/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
