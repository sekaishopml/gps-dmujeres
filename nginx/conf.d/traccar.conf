server {
    listen 80 default_server;
    server_name _;

    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    location = / {
        return 301 /dmujeres-traccar/;
    }

    location /dmujeres-traccar/ {
        proxy_pass http://traccar:8082/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Google Maps tiles proxy directo + caché en SSD
    location /google-tiles/ {
        rewrite ^/google-tiles/(.*)$ /vt?$1 break;
        proxy_pass https://mt0.google.com;
        proxy_http_version 1.1;
        proxy_set_header Host mt0.google.com;
        proxy_set_header Connection "";
        proxy_cache tile_cache;
        proxy_cache_key "$scheme$request_method$host$uri$is_args$args";
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        add_header X-Cache-Status $upstream_cache_status;
        proxy_read_timeout 10s;
    }

    location = /basemaps.js { proxy_pass http://traccar:8082; proxy_hide_header Cache-Control; add_header Cache-Control "no-cache, must-revalidate"; }
    location = /styles.css { proxy_pass http://traccar:8082; proxy_hide_header Cache-Control; add_header Cache-Control "no-cache, must-revalidate"; }
    location = /custom.css { proxy_pass http://traccar:8082; proxy_hide_header Cache-Control; add_header Cache-Control "no-cache, must-revalidate"; }
    location = /favicon.ico { proxy_pass http://traccar:8082; proxy_hide_header Cache-Control; add_header Cache-Control "no-cache, must-revalidate"; }
    location = /manifest.webmanifest { proxy_pass http://traccar:8082; proxy_hide_header Cache-Control; add_header Cache-Control "no-cache, must-revalidate"; }
    location = /sw.js { proxy_pass http://traccar:8082; proxy_hide_header Cache-Control; add_header Cache-Control "no-cache, must-revalidate"; }
    location = /ecuador.pmtiles { proxy_pass http://traccar:8082; proxy_hide_header Cache-Control; add_header Cache-Control "no-cache, must-revalidate"; }
    location ~* ^/apple-touch-icon { proxy_pass http://traccar:8082; proxy_hide_header Cache-Control; add_header Cache-Control "no-cache, must-revalidate"; }

    location / {
        proxy_pass http://traccar:5055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /route-worker.js {
        proxy_pass http://webhook-receiver:8000/route-worker.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /api/v2/ {
        proxy_pass http://webhook-receiver:8000/api/v2/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/session {
        proxy_pass http://webhook-receiver:8000/api/session;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/positions {
        proxy_pass http://webhook-receiver:8000/api/positions;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/devices {
        proxy_pass http://webhook-receiver:8000/api/devices;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dmujeres-gps/ {
        proxy_pass http://traccar:8082/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    location /admin/ {
        proxy_pass http://traccar:8082/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    location /assets/ {
        proxy_pass http://traccar:8082/assets/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://traccar:8082/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
